<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Ma Bibliothèque Elsa</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b0610">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <input type="file" id="coverUpload" accept="image/*" hidden>

  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo">📖</div><div><b>Ma Bibliothèque ♡</b><br><span>Elsa</span></div></div>
      <div class="nav">
        <button onclick="setStatus('')">🏠 Accueil</button>
        <button onclick="setStatus('')">📚 Bibliothèque</button>
        <button onclick="setStatus('Wishlist')">💖 Wishlist</button>
        <button onclick="setStatus('En cours')">⏳ En cours</button>
        <button onclick="setStatus('Lu')">✅ Terminés</button>
      </div>
      <div class="section filter">
        <small>FILTRES</small>
        <button onclick="setStatus('')">📚 Tous les livres <span id="totalMini">0</span></button>
        <button onclick="toggleAuthor()">👤 Par auteur</button>
        <div id="authorPanel" class="author-panel" style="display:none;">
          <input id="authorSearch" placeholder="Chercher un auteur..." oninput="setAuthorSearch(this.value)">
          <button class="author-clear" onclick="setAuthorSearch('');authorSearch.value='';">Effacer</button>
        </div>
        <button onclick="setStatus('À lire')">📌 À lire</button>
        <button onclick="sortBy='rating';render()">⭐ Par note</button>
        <button type="button" disabled>📚 Pages lues : <span id="totalReadPages">0</span></button>
      </div>
      <div class="bottom"><div class="theme-toggle" onclick="toggleTheme()"><span id="themeLabel">🌙 Mode sombre</span><span class="switch"></span></div><br>⚙️ Sauvegarde automatique<br><span style="color:#22c55e;font-size:13px;">Activée</span></div>
    </aside>

    <main>
      <div class="top"><div><h1>Ma bibliothèque 📖</h1><div class="count"><span id="count">0</span> livres au total</div></div><div class="searchbar"><input id="search" placeholder="Rechercher un livre, un auteur..." oninput="render()"><button class="soft" onclick="openScannerModal()">📷 ISBN</button><button class="add" onclick="openModal()">+ Ajouter</button></div></div>
      <div class="tabs"><button data-status="" onclick="setStatus('')">📚 Tous</button><button data-status="À lire" onclick="setStatus('À lire')">📌 À lire</button><button data-status="En cours" onclick="setStatus('En cours')">⏳ En cours</button><button data-status="Lu" onclick="setStatus('Lu')">✅ Terminés</button><button data-status="Wishlist" onclick="setStatus('Wishlist')">💖 Wishlist</button><button data-status="Nouveautés" onclick="setStatus('Nouveautés')">🆕 Nouveautés</button><button type="button" onclick="toggleAuthor()">👤 Par auteur</button></div>
      <div class="mobile-filter"><input id="mobileAuthorSearch" placeholder="Filtrer par auteur..." oninput="setAuthorSearch(this.value)"><select onchange="sortBy=this.value;render()"><option value="recent">Plus récent</option><option value="title">Titre</option><option value="author">Auteur</option><option value="rating">Note</option></select></div>
      <input type="hidden" id="authorFilter" value=""><section id="grid" class="grid"></section>
    </main>
  </div>

  <div class="modal" id="modal">
    <div class="box">
      <h2 id="modalTitle">Ajouter un livre</h2>
      <button class="soft scanner-trigger" id="scanIsbnBtn" type="button">📷 Scanner ISBN</button>
      <div class="isbn-manual"><input id="manualIsbnInput" type="text" placeholder="Saisir un ISBN manuellement"><button class="soft" id="manualIsbnSearchBtn" type="button">Rechercher ISBN</button></div>
      <section class="scanner-panel" id="scannerPanel" hidden><div class="scanner-video-wrap"><video id="scannerVideo" playsinline muted autoplay></video></div><p class="scanner-status" id="scannerStatus">Recherche du livre…</p><button class="soft scanner-stop" id="stopScanBtn" type="button">Arrêter le scan</button></section>
      <input id="isbn" type="text" placeholder="ISBN">
      <input id="t" placeholder="Titre du livre">
      <input id="a" placeholder="Auteur">
      <input id="publisher" placeholder="Éditeur">
      <input id="publishedDate" placeholder="Date de publication">
      <input id="pages" type="number" min="0" placeholder="Nombre de pages">
      <input id="language" placeholder="Langue">
      <input id="categories" placeholder="Genres / Catégories">
      <textarea id="description" placeholder="Résumé / Description"></textarea>
      <textarea id="images" placeholder="Images (URLs séparées par des virgules)"></textarea>
      <select id="st"><option>À lire</option><option>En cours</option><option>Lu</option><option>Wishlist</option></select>
      <select id="rt"><option value="0">Sans note</option><option value="1">⭐</option><option value="2">⭐⭐</option><option value="3">⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="5">⭐⭐⭐⭐⭐</option></select>
      <textarea id="note" placeholder="Note personnelle..."></textarea>
      <p class="help">Couverture : ajoute une image depuis ton téléphone ou colle un lien d’image.</p>
      <input id="coverUrl" placeholder="Lien image internet de la couverture">
      <button class="soft" onclick="chooseCover()">Choisir une image</button>
      <div class="preview" id="preview">Aperçu de la couverture</div>
      <button class="add" onclick="saveBook()">Enregistrer</button>
      <button class="soft" onclick="closeModal()">Fermer</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
